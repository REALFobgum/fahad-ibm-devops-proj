define host {
    use                     linux-server
    host_name               abc-tech-cluster
    alias                   ABC Technologies K8s Cluster
    address                 192.168.49.2
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-tech-cluster
    service_description     HTTP Web Availability
    check_command           check_http!-p 32734 -u /index.html
    check_interval          2
    retry_interval          1
    max_check_attempts      3
    check_period            24x7
    notification_interval   30
}
